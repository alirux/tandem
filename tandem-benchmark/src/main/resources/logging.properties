# java.util.logging config for the benchmark run: tandem-jdbc/tandem-core log via the JDK's
# System.Logger (HLD-logging.md §2.1), which defaults to this backend. Root stays INFO so JDK/
# third-party FINE chatter doesn't flood the console; the com.codingful.tandem namespace is
# raised to FINE (= DEBUG) so the relay's per-cycle claim/reclaim logging is visible too. This is
# the leaf app's own choice — the library itself ships no logging configuration.
handlers=java.util.logging.ConsoleHandler
.level=INFO
com.codingful.tandem.level=FINE
java.util.logging.ConsoleHandler.level=FINE
java.util.logging.SimpleFormatter.format=%1$tH:%1$tM:%1$tS %4$-7s %3$s - %5$s%n
