# slf4j-simple config for the benchmark run: keep third-party chatter (Kafka clients,
# Testcontainers, HikariCP) at WARN so it does not drown out Tandem's own application logs,
# which stay visible at DEBUG (HLD-logging.md §2/§8 — this is the leaf app's own choice, not
# something the library imposes).
org.slf4j.simpleLogger.defaultLogLevel=warn
org.slf4j.simpleLogger.log.com.codingful.tandem=debug
org.slf4j.simpleLogger.showThreadName=true
org.slf4j.simpleLogger.showLogName=true
org.slf4j.simpleLogger.levelInBrackets=true
